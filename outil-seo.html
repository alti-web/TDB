<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outil SEO — Alti-Web</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; background:#fff; }
    .wrap {
      position:fixed;
      /* dépasse de chaque côté pour masquer les bordures/barre Claude */
      top:-48px;
      left:-2px;
      right:-2px;
      bottom:-48px;
      overflow:hidden;
    }
    iframe {
      display:block;
      width:100%;
      height:100%;
      border:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe src="https://claude.ai/public/artifacts/eb6106ae-cd77-46b4-8e36-ab477f296885" title="Claude Artifact" allow="clipboard-write" allowfullscreen></iframe>
  </div>
</body>
</html>
