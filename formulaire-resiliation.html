<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirection — Alti-Web</title>
  <meta http-equiv="refresh" content="0; url=https://billing.stripe.com/p/login/4gw6pC4ww59I7NSbII">
  <link rel="canonical" href="https://billing.stripe.com/p/login/4gw6pC4ww59I7NSbII">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0B0F1A;
      color: #E8ECF4;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .box {
      max-width: 460px; text-align: center;
      background: #131825;
      border: 1px solid rgba(79,140,255,0.15);
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; margin-bottom: 14px;
      background: linear-gradient(135deg, #E8ECF4, #4F8CFF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { color: #8892A8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 22px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(79,140,255,0.18);
      border-top-color: #4F8CFF;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a.btn {
      display: inline-block;
      padding: 12px 26px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4F8CFF, #A78BFA);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(79,140,255,0.35); }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>Redirection en cours…</h1>
    <p>Vous êtes redirigé vers votre portail de gestion d'abonnement Stripe.</p>
    <a href="https://billing.stripe.com/p/login/4gw6pC4ww59I7NSbII" class="btn">Accéder au portail →</a>
  </div>
  <script>
    // Redirection JS immédiate (en plus du meta refresh)
    location.replace('https://billing.stripe.com/p/login/4gw6pC4ww59I7NSbII');
  </script>
</body>
</html>
